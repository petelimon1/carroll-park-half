<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carroll Park Half Marathon – Course Map</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">

  <!-- Shared nav styles -->
  <link href="assets/css/nav.css" rel="stylesheet" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: transparent;
    }

    /* Page-specific background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: url("carrollparkcorner2.png") no-repeat center center fixed;
      background-size: cover;
    }

    .main-content {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 72px 16px 16px;
      text-align: center;
    }

    .page-wrapper {
      background: rgba(255, 255, 255, 0.8);
      border-radius: 8px;
      padding: 16px 20px 20px;
      max-width: 740px;
      width: 100%;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 90px);
    }

    h2.page-title {
      font-size: 1.4em;
      margin: 0 0 12px;
      flex-shrink: 0;
    }

    .map-section {
      display: flex;
      justify-content: center;
      flex: 1;
      min-height: 0;
    }

    .strava-embed-placeholder {
      width: 100%;
      max-width: 680px;
      height: 100%;
      min-height: 280px;
    }

    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .main-content { height: auto; padding: 90px 12px 24px; align-items: flex-start; }
      .page-wrapper { max-height: none; padding: 14px; }
      h2.page-title { font-size: 1.2em; }
      .strava-embed-placeholder { height: 320px; }
    }
  </style>
</head>
<body>
  <!-- Nav is injected from nav.html by assets/js/nav.js -->

  <div class="main-content">
    <div class="page-wrapper">
      <h2 class="page-title">Course Map (repeat 53 times)</h2>
      <div class="map-section">
        <div class="strava-embed-placeholder" 
             data-embed-type="route" 
             data-embed-id="3353784827080272942" 
             data-style="standard" 
             data-map-hash="16.2/40.68112/-73.99543" 
             data-from-embed="true">
        </div>
      </div>
    </div>
  </div>

  <script src="https://strava-embeds.com/embed.js"></script>
  <!-- Shared nav loader -->
  <script defer src="assets/js/nav.js"></script>
</body>
</html>
